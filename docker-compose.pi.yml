services:
  backend:
    image: imvalerio/whatsinmyfridge-be
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - backend_data:/root
    restart: always

  frontend:
    image: imvalerio/whatsinmyfridge-fe
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  backend_data:
